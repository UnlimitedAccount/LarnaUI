<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Klarna Wallet</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: #020617;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #1f2937;
      text-align: center;
    }

    img.logo {
      width: 120px;
      margin-bottom: 20px;
      filter: brightness(0) invert(1);
    }

    .loading {
      font-size: 18px;
      margin-top: 20px;
      color: #93c5fd;
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #1e3a8a;
      border-top-color: #60a5fa;
      border-radius: 50%;
      margin: 20px auto;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1, h2 {
      margin: 0 0 16px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #9ca3af;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
    }

    .wallet-balance {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .interest {
      font-size: 14px;
      color: #22c55e;
      margin-bottom: 16px;
    }

    .wallet-label {
      font-size: 13px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .transactions {
      margin-top: 16px;
      max-height: 200px;
      overflow-y: auto;
      border-top: 1px solid #111827;
      padding-top: 12px;
      font-size: 14px;
      text-align: left;
    }

    .tx {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .tx-amount.plus {
      color: #22c55e;
      font-weight: 600;
    }

    .logout {
      margin-top: 16px;
      background: #111827;
      border: 1px solid #374151;
    }

    @media (max-width: 480px) {
      .card { padding: 18px; }
      img.logo { width: 90px; }
      .wallet-balance { font-size: 26px; }
      button { padding: 10px; font-size: 15px; }
      input { font-size: 15px; }
    }
  </style>
</head>

<body>
  <div class="card">

    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Klarna_Logo_black.svg" alt="Logo">

    <!-- LOGIN -->
    <div id="login-view">
      <h1>Accedi al tuo Wallet</h1>

      <div class="error" id="login-error" style="display:none;color:#f97373;font-size:14px;margin-bottom:10px;"></div>

      <label for="username">Username</label>
      <input id="username" type="text" placeholder="es. demo" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="es. password123" />

      <button id="login-btn">Entra</button>

      <!-- LOADING -->
      <div class="spinner" id="spinner"></div>
      <div class="loading" id="loading-text">Attendere…</div>
    </div>

    <!-- WALLET -->
    <div id="wallet-view" style="display:none;">
      <h2>Ciao, <span id="user-name"></span></h2>

      <div class="wallet-label">Saldo disponibile</div>
      <div class="wallet-balance" id="wallet-balance">€ 0,00</div>

      <div class="interest">Interesse annuo: 1,85%</div>

      <div class="row">
        <input id="amount" type="number" min="1" step="1" placeholder="Importo in €" />
        <button id="add-btn" style="width:auto;white-space:nowrap;">Aggiungi</button>
      </div>

      <div class="transactions" id="transactions">
        <div style="color:#6b7280;">Nessuna transazione ancora.</div>
      </div>

      <button class="logout" id="logout-btn">Logout</button>
    </div>
  </div>

  <script>
    const VALID_USERNAME = "demo";
    const VALID_PASSWORD = "password123";

    let balance = 0;
    let txs = [];

    const loginView = document.getElementById("login-view");
    const walletView = document.getElementById("wallet-view");
    const loginError = document.getElementById("login-error");
    const spinner = document.getElementById("spinner");
    const loadingText = document.getElementById("loading-text");

    document.getElementById("login-btn").addEventListener("click", () => {
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;

      if (u === VALID_USERNAME && p === VALID_PASSWORD) {
        loginError.style.display = "none";

        spinner.style.display = "block";
        loadingText.style.display = "block";

        setTimeout(() => {
          spinner.style.display = "none";
          loadingText.style.display = "none";

          loginView.style.display = "none";
          walletView.style.display = "block";

          document.getElementById("user-name").textContent = u;
          renderBalance();
          renderTransactions();
        }, 5000);

      } else {
        loginError.textContent = "Credenziali non valide.";
        loginError.style.display = "block";
      }
    });

    document.getElementById("add-btn").addEventListener("click", () => {
      const amountInput = document.getElementById("amount");
      const value = parseFloat(amountInput.value);
      if (isNaN(value) || value <= 0) return;

      balance += value;
      txs.unshift({
        type: "DEPOSIT",
        amount: value,
        date: new Date().toLocaleString()
      });

      amountInput.value = "";
      renderBalance();
      renderTransactions();
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      walletView.style.display = "none";
      loginView.style.display = "block";
      document.getElementById("password").value = "";
    });

    function renderBalance() {
      document.getElementById("wallet-balance").textContent =
        "€ " + balance.toFixed(2).replace(".", ",");
    }

    function renderTransactions() {
      const txContainer = document.getElementById("transactions");

      if (txs.length === 0) {
        txContainer.innerHTML = '<div style="color:#6b7280;">Nessuna transazione ancora.</div>';
        return;
      }

      txContainer.innerHTML = "";
      txs.forEach(tx => {
        const div = document.createElement("div");
        div.className = "tx";
        div.innerHTML = `
          <span>Ricarica • <span style="color:#6b7280;font-size:12px;">${tx.date}</span></span>
          <span class="tx-amount plus">+ € ${tx.amount.toFixed(2).replace(".", ",")}</span>
        `;
        txContainer.appendChild(div);
      });
    }
  </script>
</body>
</html>
